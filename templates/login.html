<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTF — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0a0f; --bg2:#13131a; --bg3:#1c1c26; --border:#2a2a3a;
      --accent:#f0a500; --accent2:#ffcc55; --accent-glow:rgba(240,165,0,0.2);
      --red:#ff4d4d; --green:#00e676; --text:#f0f0f0; --text2:#9999bb;
      --radius:16px; --transition:0.3s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="light"] {
      --bg:#f4f4f8; --bg2:#ffffff; --bg3:#ececf3; --border:#d0d0e0;
      --accent:#d4900a; --accent-glow:rgba(212,144,10,0.15);
      --text:#111120; --text2:#666688;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body {
      font-family:'Syne',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px;
      transition:background var(--transition),color var(--transition);
      position:relative;
      overflow:hidden;
    }

    /* animated background glow */
    body::before {
      content:'';
      position:fixed;
      top:-100px; left:50%;
      transform:translateX(-50%);
      width:700px; height:500px;
      background:radial-gradient(ellipse,rgba(240,165,0,0.1) 0%,transparent 65%);
      pointer-events:none;
      animation:pulse 4s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}

    /* floating coins background */
    .bg-coins {
      position:fixed; inset:0; pointer-events:none; overflow:hidden;
    }
    .bg-coin {
      position:absolute;
      font-size:24px;
      opacity:0.04;
      animation:floatCoin linear infinite;
    }
    @keyframes floatCoin{
      0%{transform:translateY(100vh) rotate(0deg);opacity:0}
      10%{opacity:0.06}
      90%{opacity:0.06}
      100%{transform:translateY(-120px) rotate(360deg);opacity:0}
    }

    /* THEME TOGGLE */
    .theme-toggle {
      position:fixed; top:20px; right:20px;
      background:var(--bg2); border:1px solid var(--border);
      border-radius:50px; width:60px; height:30px;
      cursor:pointer; display:flex; align-items:center; padding:3px;
      transition:var(--transition); z-index:10;
    }
    .theme-toggle::after{content:'';width:22px;height:22px;background:var(--accent);border-radius:50%;transition:var(--transition);box-shadow:0 0 8px var(--accent-glow)}
    [data-theme="light"] .theme-toggle::after{transform:translateX(30px)}
    .theme-icon{position:absolute;font-size:12px;top:50%;transform:translateY(-50%);pointer-events:none}
    .theme-icon.moon{left:6px} .theme-icon.sun{right:4px}

    /* CARD */
    .auth-card {
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:40px 36px;
      width:min(420px, 100%);
      box-shadow:0 8px 48px rgba(0,0,0,0.5);
      position:relative;
      overflow:hidden;
      animation:cardIn 0.4s ease;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .auth-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
    }

    /* LOGO */
    .auth-logo {
      display:flex; align-items:center; justify-content:center;
      gap:12px; margin-bottom:32px;
    }
    .auth-logo-icon {
      width:48px; height:48px;
      background:var(--accent); border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:26px;
      box-shadow:0 0 24px var(--accent-glow);
    }
    .auth-logo-text { font-size:26px; font-weight:800; }
    .auth-logo-text span { color:var(--accent); }
    .auth-logo-sub { font-size:10px; color:var(--text2); letter-spacing:2px; text-transform:uppercase; font-family:'Space Mono',monospace; }

    /* TABS */
    .auth-tabs {
      display:flex; background:var(--bg3);
      border-radius:12px; padding:4px; margin-bottom:28px;
    }
    .auth-tab {
      flex:1; padding:10px; border-radius:9px; border:none;
      cursor:pointer; font-family:'Syne',sans-serif;
      font-size:14px; font-weight:700;
      background:transparent; color:var(--text2);
      transition:var(--transition);
    }
    .auth-tab.active { background:var(--accent); color:#000; box-shadow:0 2px 12px var(--accent-glow); }

    /* FORM */
    .auth-form { display:flex; flex-direction:column; gap:16px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label {
      font-size:10px; font-weight:700; letter-spacing:2px;
      text-transform:uppercase; color:var(--text2);
      font-family:'Space Mono',monospace;
    }
    .form-input {
      padding:13px 16px;
      background:var(--bg3);
      border:1px solid var(--border);
      border-radius:12px;
      font-family:'Syne',sans-serif;
      font-size:15px;
      color:var(--text);
      outline:none;
      transition:border-color var(--transition);
      width:100%;
    }
    .form-input:focus { border-color:var(--accent); }
    .form-input::placeholder { color:var(--text2); }

    /* password wrapper */
    .pw-wrap { position:relative; }
    .pw-wrap .form-input { padding-right:48px; }
    .pw-toggle {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer;
      font-size:18px; color:var(--text2); padding:4px;
    }

    /* submit button */
    .auth-btn {
      padding:15px;
      background:var(--accent);
      border:none; border-radius:12px;
      font-family:'Syne',sans-serif;
      font-size:16px; font-weight:800; letter-spacing:0.5px;
      color:#000; cursor:pointer;
      transition:var(--transition);
      box-shadow:0 4px 20px var(--accent-glow);
      margin-top:4px;
    }
    .auth-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px var(--accent-glow); }
    .auth-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    /* message */
    .auth-msg {
      padding:11px 14px;
      border-radius:10px;
      font-size:13px;
      font-family:'Space Mono',monospace;
      text-align:center;
      display:none;
      animation:fadeUp 0.3s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .auth-msg.error  { background:rgba(255,77,77,0.12);  border:1px solid rgba(255,77,77,0.3);  color:var(--red); display:block; }
    .auth-msg.success{ background:rgba(0,230,118,0.10); border:1px solid rgba(0,230,118,0.3); color:var(--green); display:block; }

    /* divider */
    .auth-divider {
      display:flex; align-items:center; gap:12px;
      color:var(--text2); font-size:12px; font-family:'Space Mono',monospace;
      margin:4px 0;
    }
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

    /* footer note */
    .auth-note {
      text-align:center; margin-top:20px;
      font-size:11px; color:var(--text2);
      font-family:'Space Mono',monospace;
    }
    .auth-note span { color:var(--accent); }

    /* loading spinner inside button */
    .btn-spinner {
      display:inline-block; width:16px; height:16px;
      border:2px solid rgba(0,0,0,0.3);
      border-top-color:#000; border-radius:50%;
      animation:spin 0.6s linear infinite;
      vertical-align:middle; margin-right:8px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- floating coins bg -->
<div class="bg-coins" id="bgCoins"></div>

<!-- theme toggle -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme">
  <span class="theme-icon moon">🌙</span>
  <span class="theme-icon sun">☀️</span>
</button>

<!-- AUTH CARD -->
<div class="auth-card">

  <!-- logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon">₿</div>
    <div>
      <div class="auth-logo-text">CTF <span>·</span></div>
      <div class="auth-logo-sub">Crypto To Fiat</div>
    </div>
  </div>

  <!-- tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
    <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- message -->
  <div class="auth-msg" id="authMsg"></div>

  <!-- LOGIN FORM -->
  <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="your@email.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input class="form-input" id="loginPassword" type="password" placeholder="Enter your password" required/>
        <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)">👁</button>
      </div>
    </div>
    <button class="auth-btn" id="loginBtn" type="submit">Login to CTF</button>
  </form>

  <!-- SIGNUP FORM -->
  <form class="auth-form" id="signupForm" style="display:none" onsubmit="handleSignup(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="signupUsername" type="text" placeholder="Choose a username" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="signupEmail" type="email" placeholder="your@email.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input class="form-input" id="signupPassword" type="password" placeholder="At least 6 characters" required/>
        <button type="button" class="pw-toggle" onclick="togglePw('signupPassword',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="pw-wrap">
        <input class="form-input" id="signupConfirm" type="password" placeholder="Repeat your password" required/>
        <button type="button" class="pw-toggle" onclick="togglePw('signupConfirm',this)">👁</button>
      </div>
    </div>
    <button class="auth-btn" id="signupBtn" type="submit">Create Account</button>
  </form>

  <div class="auth-note">
    Powered by <span>CoinGecko API</span> · <span>CTF</span> © 2025
  </div>
</div>

<script>
  /* ── THEME ── */
  const saved = localStorage.getItem('ctf_theme')||'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ctf_theme', next);
  });

  /* ── FLOATING COINS ── */
  const symbols = ['₿','Ξ','◎','✕','⬡','Ð','₳','◈'];
  const bg = document.getElementById('bgCoins');
  for(let i=0;i<18;i++){
    const el = document.createElement('div');
    el.className = 'bg-coin';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left = Math.random()*100+'vw';
    el.style.fontSize = (16+Math.random()*28)+'px';
    el.style.animationDuration = (12+Math.random()*18)+'s';
    el.style.animationDelay = (-Math.random()*20)+'s';
    bg.appendChild(el);
  }

  /* ── TABS ── */
  function switchTab(tab) {
    document.getElementById('loginForm').style.display  = tab==='login'  ? 'flex':'none';
    document.getElementById('signupForm').style.display = tab==='signup' ? 'flex':'none';
    document.getElementById('tabLogin').classList.toggle('active',  tab==='login');
    document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
    clearMsg();
  }

  /* ── MESSAGE ── */
  function showMsg(msg, type) {
    const el = document.getElementById('authMsg');
    el.textContent = msg;
    el.className = 'auth-msg '+type;
  }
  function clearMsg() {
    const el = document.getElementById('authMsg');
    el.className = 'auth-msg';
    el.textContent = '';
  }

  /* ── PASSWORD TOGGLE ── */
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type==='password' ? 'text' : 'password';
    btn.textContent = input.type==='password' ? '👁' : '🙈';
  }

  /* ── LOGIN ── */
  async function handleLogin(e) {
    e.preventDefault();
    clearMsg();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span>Logging in…';

    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
      const res  = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();

      if(data.success) {
        showMsg('✅ Welcome back, '+data.username+'! Redirecting…', 'success');
        setTimeout(()=>{ window.location.href='/app'; }, 1000);
      } else {
        showMsg('❌ '+data.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Login to CTF';
      }
    } catch(err) {
      showMsg('❌ Could not connect to server. Is it running?', 'error');
      btn.disabled = false;
      btn.textContent = 'Login to CTF';
    }
  }

  /* ── SIGNUP ── */
  async function handleSignup(e) {
    e.preventDefault();
    clearMsg();

    const username = document.getElementById('signupUsername').value;
    const email    = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;

    if(password !== confirm) {
      showMsg('❌ Passwords do not match.', 'error');
      return;
    }

    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span>Creating account…';

    try {
      const res  = await fetch('/api/signup', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, email, password})
      });
      const data = await res.json();

      if(data.success) {
        showMsg('✅ Account created! Welcome, '+data.username+'! Redirecting…', 'success');
        setTimeout(()=>{ window.location.href='/app'; }, 1200);
      } else {
        showMsg('❌ '+data.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    } catch(err) {
      showMsg('❌ Could not connect to server. Is it running?', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  /* ── CHECK IF ALREADY LOGGED IN ── */
  (async () => {
    try {
      const res  = await fetch('/api/me');
      const data = await res.json();
      if(data.loggedIn) window.location.href='/app';
    } catch(e) {}
  })();
</script>
</body>
</html>
